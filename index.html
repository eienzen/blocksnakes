<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockSnakes Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .section {
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        #status {
            color: #333;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BlockSnakes Game</h1>
        
        <div class="section">
            <h2>Connect Wallet</h2>
            <button onclick="connectWallet()">Connect Metamask</button>
            <p>Connected Account: <span id="account">Not connected</span></p>
        </div>

        <div class="section">
            <h2>Player Actions</h2>
            <button onclick="claimWelcomeBonus()">Claim Welcome Bonus</button>
            <button onclick="claimRewards()">Claim Game Rewards</button>
            <button onclick="withdrawTokens()">Withdraw Tokens</button>
            <input type="number" id="rewardAmount" placeholder="Reward Amount (BST)">
            <input type="text" id="referrer" placeholder="Referrer Address (optional)">
        </div>

        <div class="section">
            <h2>Player Info</h2>
            <button onclick="getPlayerInfo()">Get Player Info</button>
            <p>Balance: <span id="balance">0 BST</span></p>
            <p>Games Played: <span id="gamesPlayed">0</span></p>
            <p>Total Rewards: <span id="totalRewards">0 BST</span></p>
            <p>Referral Rewards: <span id="referralRewards">0 BST</span></p>
        </div>

        <div class="section">
            <h2>Contract Info</h2>
            <button onclick="getContractBalance()">Check Contract Balance</button>
            <p>Contract BST: <span id="contractBalance">0 BST</span></p>
            <p>Contract BNB: <span id="contractBnbBalance">0 BNB</span></p>
        </div>

        <div id="status"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.7.4/dist/web3.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
