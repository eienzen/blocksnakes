<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Block Snakes Game</title>
    <style>
        #gameCanvas { border: 1px solid white; }
        #gameOverPopup { 
            display: none; 
            position: fixed; 
            background: rgba(0,0,0,0.8); 
            color: white; 
            padding: 20px; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center; 
            border-radius: 10px;
        }
        #loadingIndicator { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: white; 
            font-size: 20px; 
            background: rgba(0,0,0,0.7); 
            padding: 15px; 
            border-radius: 5px;
        }
        .error { color: red; display: none; margin-top: 5px; }
        .valid { color: green; display: none; margin-top: 5px; }
        body {
            background-color: #0a0a23;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background-color: #00ffcc;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #00ccaa;
        }
        input {
            padding: 5px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>Block Snakes Game</h1>
    <button id="connectWallet">Connect Wallet</button>
    <button id="disconnectWallet" style="display: none;">Disconnect Wallet</button>
    <p id="walletAddress"></p>
    <button id="playGame">Play Game</button>
    <div>
        <label for="referralInput">Enter Referral Address (Optional):</label>
        <input type="text" id="referralInput" placeholder="0x...">
        <button id="validateReferral">Validate Referral</button>
        <p id="referralValidation" class="error">Invalid Ethereum address!</p>
        <p id="referralValid" class="valid">Valid Ethereum address!</p>
    </div>
    <button id="getReferralLink">Get Referral Link</button>
    <button id="welcomeBonusButton">Claim Welcome Bonus</button>
    <button id="claimGameRewards">Claim Rewards</button>
    <div>
        <p id="gamesPlayed"></p>
        <p id="totalGameRewards"></p>
        <p id="totalReferrals"></p>
        <p id="referralRewards"></p>
        <p id="pendingRewards"></p>
        <p id="walletBalance"></p>
        <p id="boxesEaten"></p>
    </div>
    <ul id="rewardHistoryList" style="list-style-type: none; padding: 0;"></ul>
    <canvas id="gameCanvas"></canvas>
    <div id="gameOverPopup">
        <h2>Game Over!</h2>
        <p id="finalBoxesEaten"></p>
        <p id="finalRewards"></p>
        <button id="closePopup">Close</button>
    </div>
    <div id="loadingIndicator">Loading... <span class="spinner">⏳</span></div>
    <script src="game.js"></script>
</body>
</html>
