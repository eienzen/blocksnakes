<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockSnakes Game</title>
    <link rel="icon" href="data:image/x-icon;base64,AA"> <!-- Favicon त्रुटि ठीक करने के लिए -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" integrity="sha512-e+N5qCofp4I4pC0HaN5yPWFo8nP2J6Y3mR0D60sMyj1y0V0yTabh1MnkNETqEpSv1WoRWlJ0A3X9h5w1q9w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        canvas {
            border: 1px solid black;
            margin: 20px auto;
            display: block;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        #gameInfo {
            margin: 20px;
        }
        #rewardHistoryList {
            list-style-type: none;
            padding: 0;
            max-width: 600px;
            margin: 20px auto;
            text-align: left;
        }
        #rewardHistoryList li {
            background-color: #fff;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .info-box {
            margin: 10px 0;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>BlockSnakes Game</h1>
    <button id="connectWallet">Connect Wallet</button>
    <button id="disconnectWallet" style="display:none;">Disconnect Wallet</button>
    <div id="gameInfo">
        <button id="playGame">Play Game</button>
        <button id="getReferralLink">Get Referral Link</button>
        <button id="claimGameRewards">Claim Rewards</button>
        <button id="stakeButton">Stake BST</button>
        <button id="welcomeBonusButton">Claim Welcome Bonus</button>
        <canvas id="gameCanvas"></canvas>
        <div id="score" class="info-box">Score: 0</div>
        <div id="points" class="info-box">Points: 0</div>
        <div id="gameRewards" class="info-box">Game Rewards: 0 BST</div>
        <div id="gamesPlayed" class="info-box">Games Played: 0</div>
        <div id="totalGameRewards" class="info-box">Total Game Rewards: 0 BST</div>
        <div id="totalReferrals" class="info-box">Total Referrals: 0</div>
        <div id="referralRewards" class="info-box">Referral Rewards: 0 BST</div>
        <div id="pendingRewardsText" class="info-box">Pending Rewards: 0 BST</div>
        <div id="stakedAmountText" class="info-box">Staked Amount: 0 BST</div>
        <div id="pendingStakeRewardsText" class="info-box">Pending Stake Rewards: 0 BST</div>
    </div>
    <h2>Reward History</h2>
    <ul id="rewardHistoryList"></ul>
    <script src="game.js"></script>
</body>
</html>
